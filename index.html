<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
</head>
<body>
      <header>
        <nav>
            <ul>
                <li><a href="#Accueil">Accueil</a></li>
                <li><a href="#Espace">Mon Espace</a></li>
                <li><a href="#apropos">A Propos</a></li>
                <li><a href="#communaute">Communauté</a></li>
                <li><a href="#contacts">Contacts</a></li>

                <search>
                <form action="./search/">
                    <input type="search" id="products"  placeholder="Rechercher un produit..."/>
                    <button type="submit">Rechercher</button>
                </form>
                </search>

            </ul>
        </nav>
    </header>

    <main role="main">
        <section class="intro">
        <picture>
          <source media="(max-width: 600px)" srcset="assets/images/hero-mobile.jpg">
          <img src="assets/images/hero-desktop.jpg" alt="Modèles aux styles Y2K">
        </picture>

         <div id="main-intro">
            <h1>Bienvenue dans le site pour les girls!</h1>
            <video autoplay muted loop loading="lazy" width="250">
            <source src="" type="video/webm" />
            </video>

            <button id="slide-to-trendy" type="button">
                Deviens ton best self
            </button>

        </div>

        </section>

        <section id="ad-images">

           <img src="" alt="" loading="lazy" width="150" height="50" decoding="async">
           <img src="" alt="" loading="lazy" width="150" height="50" decoding="async">
           <img src="" alt="" loading="lazy" width="150" height="50" decoding="async">

        </section>

        <section id="trending">
            <h2>Trending du moment</h2>

            <div id="trendy-cards">

                <article class="products">
                    <button class="like" aria-label="Ajouter aux favoris">❤</button>
                        <img src="" alt="" loading="lazy" width="150" height="50" class="img-trendy">
                        <h3 class="product-name"></h3>
                        <p class="product-desc"></p>
                        <span class="product-price"></span>
                </article>
                <button id="more-trendy">Voir Plus</button>
            </div>         
        </section>

        <section id="community">
            <img src="" alt="" id="img-community">
            <h2 id="community-title">La Communauté</h2>
            <label for="email-community">Rejoins le Club!</label>
            <input type="email" id="email-community" placeholder="Entre ton e-mail" required>
        </section>

        <section id="eco">
            
            <h3 id="eco-title">Notre Démarche</h3>
            <span id="label-eco">+190</span>
            <p id="eco-text1"></p>

            <article class="eco-bubble">
                 <p id="eco-text2"></p>
                 <div class="round-eco">
                    <img src="" alt="" class="round-txt-eco" width="150" height="50" loading="lazy">
                 </div>
                  <div class="round-eco">
                    <img src="" alt="" class="round-txt-eco" width="150" height="50" loading="lazy">
                 </div>
            </article>

              <article class="eco-bubble">
                 <p id="eco-text3"></p>
                 <div class="round-eco">
                    <img src="" alt="" class="round-txt-eco" width="150" height="50" loading="lazy">
                 </div>
                  <div class="round-eco">
                    <img src="" alt="" class="round-txt-eco" width="150" height="50" loading="lazy">
                 </div>
            </article>
        </section>
    </main>

    <footer>
        <img src="" alt="" loading="lazy" id="logo" width="150" height="50">
        
        <nav id="more">
         <div class="inside-footer">
            <h4></h4>
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
         </div>
        </nav>
       
        <nav id="policy">
        <div class="inside-footer">
            <h4></h4>
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
         </div>
        </nav>

        <nav id="about">
        <div class="inside-footer">
            <h4></h4>
             <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
         </div>
        </nav>

        <section id="social">
            <div id="insta-round">
               <a href="" target="_blank" rel="noopener noreferrer" aria-label="Suivez-nous sur Instagram">
                <i class="fa-brands fa-instagram"></i>
               </a>
            </div>

            <div id="tiktok-round">
                <a href="" target="_blank" rel="noopener noreferrer" aria-label="Suivez-nous sur Tik Tok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
            </div>

            <div id="facebook-round">
                 <a href="" target="_blank" rel="noopener noreferrer" aria-label="Suivez-nous sur Facebook">
                    <i class="fa-brands fa-facebook"></i>
                 </a>
            </div>

            <small>Made with love by Mahira @Copywright</small>
        </section>
    </footer>
    
    
</body>
</html>
